// ─── Training Block Logic ─────────────────────────────────────────────────────
// Block phases cycle: Accumulation → Intensification → Deload (auto)
// Accumulation: more volume, moderate load. Intensification: less volume, heavier.
// Deload: triggered every ~4 weeks or when avg RPE > 9 for 2+ sessions

const DEFAULT_ALGO = {
  accumSessions: 8,
  intSessions: 4,
  deloadSessions: 2,
  deloadPct: 70,
  progressIncLarge: 2.5,
  progressIncSmall: 2.5,
  rirHardThreshold: 1.0,
  rirEasyThreshold: 0.5,
  anchorRotateSessions: 6, // rotate anchor after this many consecutive sessions
};

function getAlgoSettings() {
  try {
    const s = localStorage.getItem('gymai_algo');
    return s ? {...DEFAULT_ALGO, ...JSON.parse(s)} : DEFAULT_ALGO;
  } catch(e) { return DEFAULT_ALGO; }
}

function getCurrentBlock(sessionCount) {
  const algo = getAlgoSettings();
  const cycleLen = algo.accumSessions + algo.intSessions + algo.deloadSessions;
  const cycle = sessionCount % cycleLen;
  if (cycle >= algo.accumSessions + algo.intSessions)
    return { phase:"deload",    setAdj:-1, repAdj:+2, rpeAdj:-1.5, deloadPct: algo.deloadPct };
  if (cycle >= algo.accumSessions)
    return { phase:"intensify", setAdj:-1, repAdj:-2, rpeAdj:+0.5, deloadPct: 100 };
  return     { phase:"accumulate", setAdj:0, repAdj:0,  rpeAdj:0,   deloadPct: 100 };
}

function getAnchorRotationAdvice(exercise, history) {
  // Returns null if no rotation needed, or a reason string if rotation suggested
  const hist = history[exercise];
  if (!hist || hist.length < 5) return null;
  const recent = hist.slice(-5);
  const sessionCount = hist.length;
  // 5-7 week window = approx 5-10 sessions for that exercise
  if (sessionCount < 5) return null;
  const e1rms = recent.map(s=>s.sets.reduce((mx,x)=>Math.max(mx,calcE1RM(x.weight,x.reps,x.rpe)),0));
  const trend = (e1rms[e1rms.length-1]-e1rms[0])/(e1rms[0]||1);
  const avgRPE = recent.flatMap(s=>s.sets).reduce((s,x)=>s+x.rpe,0) / recent.flatMap(s=>s.sets).length;
  if (trend < 0.01 && sessionCount >= 7) return `Plateau detected after ${sessionCount} sessions — consider rotating anchor`;
  if (avgRPE > 9.2 && sessionCount >= 5) return `Consistently high RPE (${avgRPE.toFixed(1)}) — rotation may refresh stimulus`;
  if (sessionCount >= 10) return `${sessionCount} sessions on this anchor — good time to consider a rotation`;
  return null;
}

function calcE1RM(weight, reps, rir) {
  return weight > 0 ? weight * (1 + (reps + rir) / 30) : 0;
}

function analyzeProgress(hist) {
  if (!hist || hist.length < 1) return null;
  const e1rms = hist.map(s => s.sets.reduce((mx, x) => Math.max(mx, calcE1RM(x.weight, x.reps, x.rpe)), 0));
  const recent = e1rms.slice(-3);
  const trend = recent.length >= 2 ? (recent[recent.length-1] - recent[0]) / (recent[0] || 1) : 0;
  return { e1rms, trend, lastE1RM: e1rms[e1rms.length-1], sessions: hist.length };
}


function generateSlotSuggestion(slot, history, sessionCount=0) {
  const cat = MOVEMENT_CATEGORIES[slot.category];
  if (!cat) return { exercise:slot.currentExercise||'', weight:20, sets:3, repMin:6, repMax:12, targetRIRlo:1, targetRIRhi:3, reasoning:"Category not found.", block:"accumulate", progressionNote:null };

  const exercise = slot.currentExercise;
  const hist = history[exercise] || [];
  const isAnchor = slot.role === "anchor";

  const block = getCurrentBlock(sessionCount);
  const roleKey = slot.role === 'anchor' ? 'anchor' : slot.role === 'secondary' ? 'secondary' : 'standalone';
  const rirRangeForRole = cat.rirRange?.[roleKey] || cat.rirRange || { lo:1, hi:3 };
  const { lo: rirLoBase, hi: rirHiBase } = rirRangeForRole;
  const targetRIRlo = Math.max(0, rirLoBase - (block.rpeAdj || 0));
  const targetRIRhi = Math.max(0, rirHiBase - (block.rpeAdj || 0));

  const repRangeKey = isAnchor ? 'anchor' : 'secondary';
  const { min: repMin, max: repMax } = cat.repRanges?.[repRangeKey] || { min:6, max:12 };
  const baseSets = cat.sets?.[repRangeKey] || 3;
  const targetSets = Math.max(2, baseSets + (block.setAdj || 0));

  if (!hist.length || !hist[0]?.sets?.length) {
    return { exercise, weight:20, sets:targetSets, repMin, repMax,
      targetRIRlo, targetRIRhi,
      progressionNote:`First session — start light, aim ${repMin}–${repMax} reps @ RIR ${targetRIRhi}`, reasoning:'',
      block:block.phase, progressionNote:null };
  }

  const lastSets = hist[hist.length-1].sets;
  const firstSet = lastSets[0];
  if (!firstSet) return { exercise, weight:20, sets:targetSets, repMin, repMax,
    targetRIRlo, targetRIRhi, reasoning:"No set data.", block:block.phase, progressionNote:null };

  const lastWeight = firstSet.weight;
  const lastReps = firstSet.reps;
  const lastRPE = firstSet.rpe;

  const prog = analyzeProgress(hist);
  const trend = prog?.trend ?? 0;
  const algo = getAlgoSettings();
  const minSets = isAnchor ? 3 : 2;
  let weight = lastWeight;
  let sets = Math.max(minSets, targetSets);
  let reasons = [];
  let progressionNote = null;
  let rotationNote = null;

  // Check if anchor rotation is due
  if (slot.role === 'anchor') {
    const rotation = checkAnchorRotation(slot, history, null);
    if (rotation.shouldRotate && rotation.nextAnchor && rotation.nextAnchor !== slot.currentExercise) {
      const prog = rotation.progress;
      const trendStr = prog.trendPct >= 0 ? `+${prog.trendPct}%` : `${prog.trendPct}%`;
      rotationNote = rotation.hitCeiling
        ? `${rotation.sessionsSinceSet} sessions on this lift · overall ${trendStr} e1RM — time to rotate. Next: ${rotation.nextAnchor}`
        : `e1RM plateaued for ${prog.stallCount} sessions (${trendStr} overall) — consider rotating to ${rotation.nextAnchor}`;
    }
  }

  const firstSetRIR = lastRPE;
  const prev = hist.length >= 2 ? hist[hist.length-2] : null;
  const prevFirstSetRIR = prev?.sets?.[0]?.rpe ?? null;

  const hitProgressionTrigger = lastReps >= repMax && firstSetRIR >= targetRIRhi - 0.5;
  const tooHard = firstSetRIR <= targetRIRlo - algo.rirHardThreshold &&
    prevFirstSetRIR !== null && prevFirstSetRIR <= targetRIRlo - algo.rirHardThreshold;
  const tooEasy = firstSetRIR >= targetRIRhi + algo.rirEasyThreshold;

  if (block.phase === "deload") {
    weight = Math.round(lastWeight * (block.deloadPct/100) * 2) / 2;
    sets = Math.max(2, targetSets - 1);
    reasons.push(`Deload week — ${formatWeight(weight)}kg, ${sets}×${repMax} reps, keep it at RIR ${targetRIRhi}+`);
  } else if (hitProgressionTrigger) {
    const algo2 = getAlgoSettings();
    const increment = isAnchor ? (weight >= 60 ? algo2.progressIncLarge : algo2.progressIncSmall) : algo2.progressIncSmall;
    weight = Math.round((lastWeight + increment) * 2) / 2;
    progressionNote = `Last time ${lastReps} reps @ RIR ${lastRPE} — hit the target. Stepping up to ${formatWeight(weight)}kg. Aim for ${repMin}–${repMax} reps @ RIR ${targetRIRlo}–${targetRIRhi}`;
    // covered by progressionNote
  } else if (tooHard) {
    const algo2 = getAlgoSettings();
    const decrement = isAnchor ? (weight >= 60 ? algo2.progressIncLarge : algo2.progressIncSmall) : algo2.progressIncSmall;
    weight = Math.round(Math.max(5, lastWeight - decrement) * 2) / 2;
    progressionNote = `Last time ${lastReps} reps @ RIR ${lastRPE} — felt too heavy two sessions running. Dropping to ${formatWeight(weight)}kg. Aim for ${repMin}–${repMax} reps @ RIR ${targetRIRlo}–${targetRIRhi}`;
    // covered by progressionNote
  } else if (tooEasy) {
    progressionNote = `Last time ${lastReps} reps @ RIR ${lastRPE} — still plenty in reserve. Push for ${repMax} reps @ RIR ${targetRIRlo}–${targetRIRhi} at ${formatWeight(weight)}kg`;
    // covered by progressionNote
  } else {
    const nextReps = Math.min(repMax, lastReps + 1);
    progressionNote = `Last time ${lastReps} reps @ RIR ${lastRPE} — keep building. Aim for ${nextReps} reps @ RIR ${targetRIRlo}–${targetRIRhi} at ${formatWeight(weight)}kg`;
    // covered by progressionNote
  }

  // Volume adjustments (silent)
  if (trend > 0.5 && sets < targetSets + 1) sets = Math.min(sets + 1, targetSets + 1);
  else if (trend < -0.5 && sets > minSets) sets = Math.max(sets - 1, minSets);

  return { exercise, weight, sets, repMin, repMax, targetRIRlo, targetRIRhi,
    lastReps, lastRPE, reasoning: reasons.join(". "), block: block.phase, progressionNote, rotationNote };
}


function generateSuggestion(exercise, hist) {
  if (!hist || hist.length === 0) return { weight:20, sets:3, repMin:6, repMax:12, targetRIRlo:1, targetRIRhi:3, reasoning:"No history — start light." };
  // generateSlotSuggestion expects history keyed by exercise name
  const histObj = { [exercise]: hist };
  // Try to find the real category from EXERCISE_LIBRARY
  const libEntry = EXERCISE_LIBRARY.find(e => e.name === exercise);
  const catEntry = Object.entries(MOVEMENT_CATEGORIES).find(([cat, data]) =>
    (data.anchorPool||[]).includes(exercise) || (data.secondaryPool||[]).includes(exercise)
  );
  const category = catEntry ? catEntry[0] : "Horizontal Chest";
  const sug = generateSlotSuggestion({ category, role:"anchor", currentExercise:exercise }, histObj, hist.length);
  return { weight:sug.weight, sets:sug.sets, repMin:sug.repMin, repMax:sug.repMax, targetRIRlo:sug.targetRIRlo, targetRIRhi:sug.targetRIRhi, reasoning:sug.reasoning };
}


const FATIGUE_OVERLAP = {
  "Bench Press (Barbell)":["Bench Press (Dumbbell)","Incline Bench Press (Barbell)","Incline Bench Press (Dumbbell)"],
  "Bench Press (Dumbbell)":["Bench Press (Barbell)","Chest Fly (Cable)"],
  "Incline Bench Press (Barbell)":["Incline Bench Press (Dumbbell)","Incline Bench Press (Cable)","Bench Press (Barbell)"],
  "Incline Bench Press (Dumbbell)":["Incline Bench Press (Barbell)","Incline Bench Press (Cable)"],
  "Bent Over Row (Barbell)":["Cable Row Mid Parallel Grip","Seated Row (Machine)"],
  "Pull Up (Weighted)":["Chin Up (Weighted)","Lat Pulldown (Cable)"],
  "Chin Up (Weighted)":["Pull Up (Weighted)","Lat Pulldown (Cable)"],
  "Squat (Barbell)":["Hack Squat (Machine)","Belt Squat","Leg Press (Machine)"],
  "Overhead Press (Barbell)":["Strict Military Press (Barbell)","Dumbbell Shoulder Press"],
  "Lying Leg Curl (Machine)":["Seated Leg Curl (Machine)"],
  "Seated Leg Curl (Machine)":["Lying Leg Curl (Machine)"],
};

function getExercisesForCategory(category) {
  const cat = MOVEMENT_CATEGORIES[category];
  if (!cat) return [];
  const poolSet = new Set([...(cat.anchorPool||[]), ...(cat.secondaryPool||[])]);
  const catMuscles = new Set(cat.muscles || []);
  EXERCISE_LIBRARY.forEach(e => { if (catMuscles.has(e.muscle)) poolSet.add(e.name); });
  return [...poolSet];
}

function getAnchorProfile(anchorExercise) {
  if (!anchorExercise) return { direct:[], secondary:[], group:null, bias:null, angle:null, primaryMuscle:null };
  const entry = EXERCISE_LIBRARY.find(e => e.name === anchorExercise);
  return {
    direct: FATIGUE_OVERLAP[anchorExercise] || [],
    secondary: entry?.secondary || [],
    group: entry?.fatigueGroup || null,
    bias: entry?.bias || null,
    angle: entry?.angle || null,
    primaryMuscle: entry?.muscle || null,
  };
}

function suggestSecondaryExercise(category, history, avoidExercise=null, anchorExercise=null) {
  const cat = MOVEMENT_CATEGORIES[category];
  if (!cat) return [];
  const pool = getExercisesForCategory(category).filter(e => e !== avoidExercise);
  const anchor = getAnchorProfile(anchorExercise);

  const scored = pool.map(ex => {
    const hist = history[ex] || [];
    const lastUsed = hist.length ? hist[hist.length-1].date : '0000-00-00';
    const daysSince = Math.round((new Date() - new Date(lastUsed)) / 86400000);
    const hasHistory = hist.length > 0;

    const lib = EXERCISE_LIBRARY.find(e => e.name === ex);
    const exPrimary = lib?.muscle || '';
    const exSecondary = lib?.secondary || [];
    const exGroup = lib?.fatigueGroup || '';
    const exBias = lib?.bias || '';
    const exAngle = lib?.angle || '';

    // Cumulative overlap penalties
    const sameGroup = anchor.group && exGroup === anchor.group;
    const directHit = anchor.direct.includes(ex);
    const samePrimary = !sameGroup && exPrimary && exPrimary === anchor.primaryMuscle;
    const sharedSecondary = anchor.secondary.filter(m => exPrimary === m || exSecondary.includes(m));
    const sameAngle = !sameGroup && anchor.angle && exAngle === anchor.angle;
    // Complementary bias = lengthened+shortened pairing is actually GOOD (distinct stimulus)
    const complementaryBias = anchor.bias && exBias &&
      ((anchor.bias === 'lengthened' && exBias === 'shortened') ||
       (anchor.bias === 'shortened'  && exBias === 'lengthened'));

    const overlapPenalty =
      (sameGroup ? 30 : 0) +
      (directHit && !sameGroup ? 20 : 0) +
      (samePrimary ? 15 : 0) +
      Math.min(sharedSecondary.length * 8, 16) +
      (sameAngle ? 5 : 0) -
      (complementaryBias ? 5 : 0);

    const score = (hasHistory ? 10 : 5) + Math.min(daysSince, 30) - overlapPenalty;
    return { ex, score, daysSince, hasHistory, overlaps: overlapPenalty >= 15, overlapPenalty };
  });

  scored.sort((a,b) => b.score - a.score);
  return scored;
}


function parseCSV(text) {
  // Normalise line endings
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim().split("\n");
  if (lines.length < 2) return [];

  function parseLine(line) {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (!inQ) { inQ = true; }
        else if (line[i+1] === '"') { cur += '"'; i++; } // escaped quote ""
        else { inQ = false; }
      } else if (ch === ',' && !inQ) {
        vals.push(cur); cur = "";
      } else {
        cur += ch;
      }
    }
    vals.push(cur);
    return vals;
  }

  const headers = parseLine(lines[0]).map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = parseLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx] || "").trim(); });
    rows.push(obj);
  }
  return rows;
}

function importStrongCSV(text) {
  const rows = parseCSV(text);
  const combined = {};
  const workouts = {};

  for (const row of rows) {
    const ex = row["Exercise Name"];
    const dateRaw = (row["Date"]||"").replace(/\u202f/g," ").replace(/\xA0/g," ").trim();
    const workoutName = (row["Workout Name"]||"Imported").trim();
    const durationRaw = (row["Duration"]||"").trim();
    // Parse Strong duration format: "1h 23m" or "45m"
    let durationSecs = 0;
    const durH = durationRaw.match(/(\d+)h/); const durM = durationRaw.match(/(\d+)m/);
    if (durH) durationSecs += parseInt(durH[1]) * 3600;
    if (durM) durationSecs += parseInt(durM[1]) * 60;
    const weight = parseFloat(row["Weight"]||"0") || 0;
    const reps = parseInt(row["Reps"]||"0") || 0;
    const rpeRaw = parseFloat(row["RPE"]||"0");
    const rpe = rpeRaw > 0 ? Math.max(0, 10 - rpeRaw) : 2;
    const setNote = (row["Notes"]||"").trim();
    const workoutNote = (row["Workout Notes"]||"").trim();
    if (!ex || reps===0) continue;
    const date = dateRaw.slice(0,10);
    if (!date || date.length < 10) continue;

    // history
    if (!combined[ex]) combined[ex] = {};
    if (!combined[ex][date]) combined[ex][date] = [];
    combined[ex][date].push({weight, reps, rpe, note: setNote||undefined});

    // workoutLog
    const key = date + '|' + workoutName;
    if (!workouts[key]) workouts[key] = { date, name: workoutName, source: 'Strong',
      notes: workoutNote||undefined, durationSecs: durationSecs||undefined, exercises: {} };
    if (!workouts[key].exercises[ex]) workouts[key].exercises[ex] = [];
    workouts[key].exercises[ex].push({weight, reps, rpe, note: setNote||undefined});
  }

  const workoutLog = Object.values(workouts)
    .map(w => ({...w, exercises: Object.entries(w.exercises).map(([name, sets]) => ({name, sets}))}))
    .sort((a,b) => b.date.localeCompare(a.date));

  // Don't import Strong set notes as pinned coaching notes —
  // they are session-specific and would show incorrectly in future workouts.
  // Set notes are preserved within the workoutLog for history viewing only.
  return { history: buildHistory(combined), workoutLog, importedNotes: {} };
}


function importHevyCSV(text) {
  const rows = parseCSV(text);
  const combined = {};
  const workouts = {};

  for (const row of rows) {
    const ex = row["exercise_title"];
    const dateRaw = (row["start_time"]||"").trim();
    const workoutName = (row["title"]||"Imported").trim();
    const weight = parseFloat(row["weight_kg"]||"0") || 0;
    const reps = parseInt(row["reps"]||"0") || 0;
    const rpeRaw2 = parseFloat(row["rpe"]||"0"); const rpe = rpeRaw2 > 0 ? Math.max(0, 10 - rpeRaw2) : 2;
    if (!ex || reps===0) continue;
    const date = dateRaw.slice(0,10);
    if (!date || date.length < 10) continue;

    if (!combined[ex]) combined[ex] = {};
    if (!combined[ex][date]) combined[ex][date] = [];
    combined[ex][date].push({weight, reps, rpe});

    const key = date + '|' + workoutName;
    if (!workouts[key]) workouts[key] = { date, name: workoutName, source: 'Hevy', exercises: {} };
    if (!workouts[key].exercises[ex]) workouts[key].exercises[ex] = [];
    workouts[key].exercises[ex].push({weight, reps, rpe});
  }

  const workoutLog = Object.values(workouts)
    .map(w => ({...w, exercises: Object.entries(w.exercises).map(([name, sets]) => ({name, sets}))}))
    .sort((a,b) => b.date.localeCompare(a.date));

  return { history: buildHistory(combined), workoutLog };
}


function buildHistory(combined) {
  const history = {};
  for (const [ex, dates] of Object.entries(combined)) {
    const sessions = Object.entries(dates)
      .sort(([a],[b])=>a.localeCompare(b))
      .map(([date,sets])=>({date,sets}))
      .filter(s=>s.sets.length>0);
    if (sessions.length >= 1) history[ex] = sessions;
  }
  return history;
}

function mergeHistories(base, incoming) {
  const merged = {...base};
  for (const [ex, sessions] of Object.entries(incoming)) {
    if (!merged[ex]) { merged[ex] = sessions; continue; }
    const existingDates = new Set(merged[ex].map(s=>s.date));
    const newSessions = sessions.filter(s=>!existingDates.has(s.date));
    merged[ex] = [...merged[ex], ...newSessions].sort((a,b)=>a.date.localeCompare(b.date));
  }
  return merged;
}

// ─── AI ───────────────────────────────────────────────────────────────────────
async function askAI(messages, histCtx) {
  const lines = Object.entries(histCtx)
    .sort((a,b)=>(b[1][b[1].length-1]?.date||"").localeCompare(a[1][a[1].length-1]?.date||""))
    .slice(0,10)
    .map(([name,sessions])=>{
      const last = sessions[sessions.length-1];
      const best = last.sets.reduce((m,s)=>s.weight>m.weight?s:m, last.sets[0]);
      return `${name}: ${last.date}, best ${best.weight}kg x${best.reps} RPE${best.rpe}`;
    }).join("\n");

  const context = `You are a strength coach. Athlete's recent training:\n${lines}\n\nAnswer concisely with specific numbers.`;

  // Prepend context to the first user message
  const messagesWithContext = messages.map((m, i) =>
    i === 0 ? { ...m, content: context + "\n\nUser question: " + m.content } : m
  );

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: messagesWithContext,
    }),
  });

  const data = await response.json();
  const text = data.content?.filter(b => b.type === "text").map(b => b.text).join("") || "";
  if (!text) throw new Error(JSON.stringify(data).slice(0, 200));
  return text;
}

// ─── RPE Picker Popup ─────────────────────────────────────────────────────────
function RPEPicker({ value, onChange, onClose }) {
  // RIR 4 → 0, matching Strong's RPE 6 → 10
  // Two rows: whole numbers on top (4,3,2,1,0), halves below (3.5,2.5,1.5,0.5)
  const wholeValues = [4, 3, 2, 1, 0];
  const halfValues  = [3.5, 2.5, 1.5, 0.5];

  const rpeLabel = r => ({
    0:"Failure", 0.5:"~Failure", 1:"Near max", 1.5:"~Near max",
    2:"Very hard", 2.5:"~Very hard", 3:"Hard", 3.5:"~Hard", 4:"Moderate"
  }[r] || "");

  const strongRPE = r => (10 - r).toFixed(r%1?1:0); // e.g. RIR 2 → RPE 8

  const colourFor = r => {
    if (r===0)   return "#ef4444";
    if (r<=0.5)  return "#f97316";
    if (r<=1.5)  return "#f97316";
    if (r<=2.5)  return "#fbbf24";
    if (r<=3.5)  return "#34c759";
    return "#34c759";
  };

  const Btn = (r, large) => {

function countConsecutiveAnchorSessions(exercise, history) {
  // Count how many of the most recent sessions used this exact exercise
  const hist = history[exercise] || [];
  // hist is already filtered to this exercise — just return its length
  // as a proxy for consecutive use (since we only track exercises that were done)
  // More accurately: look across ALL exercises to count recent workout dates
  // where this exercise appeared consecutively
  return hist.length;
}

function getConsecutiveSessions(exercise, history) {
  // Look at history dates for this exercise and count how many of the
  // most recent DISTINCT workout dates are consecutive uses
  const hist = history[exercise] || [];
  if (!hist.length) return 0;
  // Since history only records sessions where the exercise was done,
  // consecutive count = how many recent sessions without a break
  // A "break" = another anchor from same category appearing in between
  // For simplicity: return the total session count (all were consecutive uses)
  return hist.length;
}

function pickNextAnchor(category, currentAnchor, history) {
  const cat = MOVEMENT_CATEGORIES[category];
  if (!cat || cat.anchorPool.length < 2) return currentAnchor;
  // Score alternatives: prefer exercises not recently used, with good e1RM history
  const alternatives = cat.anchorPool.filter(ex => ex !== currentAnchor);
  const scored = alternatives.map(ex => {
    const hist = history[ex] || [];
    const sessions = hist.length;
    const lastUsedDate = sessions ? hist[sessions-1].date : '0000-00-00';
    const daysSince = Math.round((new Date() - new Date(lastUsedDate)) / 86400000);
    const lastE1RM = sessions ? hist[sessions-1].sets.reduce(
      (mx,s) => Math.max(mx, calcE1RM(s.weight, s.reps, s.rpe)), 0) : 0;
    // Prefer: fresh (not used recently), has history (familiar), strong e1RM
    const score = Math.min(daysSince, 60) + (sessions > 0 ? 20 : 0) + lastE1RM * 0.01;
    return { ex, score, sessions, daysSince };
  });
  scored.sort((a,b) => b.score - a.score);
  return scored[0]?.ex || alternatives[0];
}

function getAnchorProgress(exercise, history) {
  const hist = history[exercise] || [];
  if (hist.length < 2) return { sessions: hist.length, e1rms: [], stallCount: 0,
    isProgressing: false, isStalled: false, trend: 'insufficient data' };

  const e1rms = hist.map(session =>
    session.sets.reduce((mx, s) => Math.max(mx, calcE1RM(s.weight, s.reps, s.rpe)), 0)
  );

  // Count consecutive sessions where e1RM did not exceed the running peak
  let stallCount = 0;
  let runningPeak = e1rms[0];
  for (let i = 1; i < e1rms.length; i++) {
    if (e1rms[i] <= runningPeak * 1.005) {
      stallCount++;
    } else {
      runningPeak = e1rms[i];
      stallCount = 0;
    }
  }

  const half = Math.max(1, Math.min(3, Math.floor(e1rms.length / 2)));
  const firstAvg = e1rms.slice(0, half).reduce((a,b)=>a+b,0) / half;
  const lastAvg  = e1rms.slice(-half).reduce((a,b)=>a+b,0) / half;
  const trendPct = firstAvg > 0 ? Math.round(((lastAvg - firstAvg) / firstAvg) * 1000) / 10 : 0;

  return {
    sessions: hist.length,
    e1rms,
    stallCount,
    peakE1RM: Math.max(...e1rms),
    latestE1RM: e1rms[e1rms.length - 1],
    isProgressing: trendPct > 2,
    isStalled: stallCount >= 2,
    trendPct,
    trend: trendPct > 2 ? 'progressing' : trendPct < -2 ? 'regressing' : 'plateaued',
  };
}

function countRecentHistorySessions(exercise, history) {
  // Count the current consecutive streak of sessions for this exercise.
  // A streak resets when there's a gap of > 35 days between sessions —
  // suggesting the exercise was rotated away and back.
  // Walk backwards from most recent session, counting until we hit a gap.
  const hist = history[exercise] || [];
  if (!hist.length) return 0;

  let streak = 1;
  for (let i = hist.length - 1; i > 0; i--) {
    const daysBetween = Math.round(
      (new Date(hist[i].date + 'T12:00:00') - new Date(hist[i-1].date + 'T12:00:00'))
      / 86400000
    );
    if (daysBetween > 35) break; // gap detected — streak ends here
    streak++;
  }
  return streak;
}

function checkAnchorRotation(slot, history, algo) {
  if (!slot.currentExercise || slot.role !== 'anchor') return { shouldRotate: false };
  const settings = algo || getAlgoSettings();
  const minSessions = 4;
  const maxSessions = settings.anchorRotateSessions || 12;

  // Combine slot.sessionCount (sessions logged in app) with imported history sessions
  // so that imported data counts toward the rotation threshold.
  // But cap the history contribution at maxSessions to avoid false triggers
  // on exercises with very long histories before the user started using gymAI.
  const appSessions     = slot.sessionCount || 0;
  const historySessions = countRecentHistorySessions(slot.currentExercise, history);
  // Use whichever is larger — app sessions always >= history sessions once synced,
  // but on first use the history may be ahead
  const sessionsSinceSet = Math.max(appSessions, historySessions);

  const progress = getAnchorProgress(slot.currentExercise, history);

  if (sessionsSinceSet < minSessions) {
    return { shouldRotate: false, progress, reason: 'too early', sessionsSinceSet };
  }

  const stalledLongEnough = progress.isStalled && sessionsSinceSet >= minSessions;
  const hitCeiling        = sessionsSinceSet >= maxSessions;

  const shouldRotate = stalledLongEnough || hitCeiling;
  const reason = hitCeiling
    ? `${sessionsSinceSet} sessions on this lift — time for a change`
    : stalledLongEnough
    ? `e1RM hasn't improved in ${progress.stallCount} sessions`
    : null;

  const nextAnchor = shouldRotate
    ? pickNextAnchor(slot.category, slot.currentExercise, history)
    : null;

  return { shouldRotate, progress, reason, nextAnchor, sessionsSinceSet, stalledLongEnough, hitCeiling };
}

function pickBestAnchor(category, history) {
  const cat = MOVEMENT_CATEGORIES[category];
  if (!cat) return null;
  const scored = cat.anchorPool.map(ex => {
    const hist = history[ex] || [];
    const sessions = hist.length;
    const lastE1RM = sessions ? hist[sessions-1].sets.reduce(
      (mx,s) => Math.max(mx, calcE1RM(s.weight, s.reps, s.rpe)), 0) : 0;
    return { ex, sessions, lastE1RM };
  });
  scored.sort((a,b) => b.sessions - a.sessions || b.lastE1RM - a.lastE1RM);
  return scored[0]?.ex || cat.anchorPool[0];
}

          const lastE1RM=hist.length?hist[hist.length-1].sets.reduce((mx,s)=>Math.max(mx,calcE1RM(s.weight,s.reps,s.rpe)),0):0;

function StrengthTrendChart({ history, planDays=[], fullScreen=false, onClose=null }) {
  const MUSCLES = ["Chest","Back","Shoulders","Legs","Arms","Core"];
  const [activeMuscles, setActiveMuscles] = useState(new Set(MUSCLES));
  const [range, setRange] = useState(30); // days

  // Map muscles to exercises
  const MUSCLE_EX = {
    Chest:["Bench Press (Barbell)","Bench Press (Dumbbell)","Incline Bench Press (Barbell)","Incline Bench Press (Dumbbell)","Incline Bench Press (Cable)","Chest Fly (Cable)","Chest Press (Machine)","Incline Chest Press (Machine)"],
    Back:["Bent Over Row (Barbell)","Pull Up (Weighted)","Chin Up (Weighted)","Lat Pulldown (Cable)","Lat Pulldown (Machine)","Cable Row Mid Parallel Grip","Seated Row (Machine)","Face Pull"],
    Shoulders:["Overhead Press (Barbell)","Strict Military Press (Barbell)","Dumbbell Shoulder Press","Lateral Raise (Machine)","Lateral Raise (Dumbbell)","Prone Rear Delt Fly","Shrug (Smith Machine) Behind The Back"],
    Legs:["Squat (Barbell)","Belt Squat","Leverage Squat","Lying Leg Curl (Machine)","Seated Leg Curl (Machine)","Leg Extension (Machine)","Glute Drive","Standing Calf Raise (Machine)"],
    Arms:["Bicep Curl (Ez Bar)","Bicep Curl (Dumbbell)","Hammer Curl (Dumbbell)","Preacher Curl (Machine)","Skullcrusher (Barbell)","Tricep Extension (Cable) Rope","Tricep Extension (Cable) Straight Bar"],
    Core:["Ab Wheel","Cable Crunch","Crunch (Machine)"],
  };

  // Build anchor exercise lookup: muscle → [anchor exercise names]
  // Falls back to the full MUSCLE_EX pool if no plan anchors found for that muscle
  const anchorsByMuscle = (() => {
    const map = {};
    (planDays || []).forEach(day => {
      day.slots.forEach(slot => {
        if (slot.role !== "anchor") return;
        const cat = MOVEMENT_CATEGORIES[slot.category];
        if (!cat) return;
        cat.muscles.forEach(muscle => {
          if (!map[muscle]) map[muscle] = new Set();
          map[muscle].add(slot.currentExercise);
        });
      });
    });
    return map;
  })();

  // Build data: for each muscle, use anchor exercises only (or full pool as fallback)
  const buildSeries = (muscleFilter) => {
    const cutoff = new Date(new Date().getTime() - range * 86400000);
    const series = {};
    muscleFilter.forEach(muscle => {
      // Prefer anchor exercises; fall back to full muscle pool if none found
      const anchors = anchorsByMuscle[muscle];
      const exes = anchors && anchors.size > 0
        ? [...anchors]
        : (MUSCLE_EX[muscle] || []);
      const byDate = {};
      exes.forEach(ex => {
        (history[ex] || []).forEach(s => {
          if (new Date(s.date + "T12:00:00") < cutoff) return;
          const best = s.sets.reduce((mx, x) =>
            x.weight > 0 ? Math.max(mx, calcE1RM(x.weight, x.reps, x.rpe)) : mx, 0);
          if (best > 0) byDate[s.date] = Math.max(byDate[s.date] || 0, best);
        });
      });
      const sorted = Object.entries(byDate).sort(([a],[b]) => a.localeCompare(b));
      if (!sorted.length) { series[muscle] = []; return; }
      const vals = sorted.map(([,v]) => v);
      const lo = Math.min(...vals);
      const hi = Math.max(...vals);
      const span = hi - lo || 1;
      // Apply 3-session rolling average to smooth out day-to-day noise
      const WINDOW = 3;
      const smoothed = vals.map((v, i) => {
        const slice = vals.slice(Math.max(0, i - WINDOW + 1), i + 1);
        return slice.reduce((s, x) => s + x, 0) / slice.length;
      });
      const sLo = Math.min(...smoothed);
      const sHi = Math.max(...smoothed);
      const sSpan = sHi - sLo || 1;
      series[muscle] = sorted.map(([date], i) => ({
        date,
        raw: vals[i],
        norm: (smoothed[i] - sLo) / sSpan,
        pct: Math.round((smoothed[i] / smoothed[0]) * 100),
      }));
    });
    return series;
  };

  const visibleMuscles = MUSCLES.filter(m => activeMuscles.has(m));
  const series = buildSeries(visibleMuscles);

  // Unified x axis, independent y per series
  const allDates = [...new Set(Object.values(series).flat().map(p => p.date))].sort();
  const hasData = allDates.length > 0;

  // Chart geometry
  const W = fullScreen ? 360 : 340;
  const H = fullScreen ? 220 : 100;
  const PAD = { l: fullScreen ? 8 : 4, r: 12, t: 10, b: fullScreen ? 24 : 16 };
  const chartW = W - PAD.l - PAD.r;
  const chartH = H - PAD.t - PAD.b;

  if (!hasData) {
    return (
      h('div', {style: {background:C.card,borderRadius:16,padding:"16px",marginBottom:14,textAlign:"center"}}, h('p', {style: {margin:0,fontSize:13,color:C.sub}}, 'No strength data in the last', range, 'days'))
    );
  }

  const startDate = new Date(allDates[0] + "T12:00:00");
  const endDate   = new Date(allDates[allDates.length-1] + "T12:00:00");
  const dateSpan  = Math.max((endDate - startDate) / 86400000, 1);

  const xOf = (dateStr) => {
    const d = (new Date(dateStr + "T12:00:00") - startDate) / 86400000;
    return PAD.l + (d / dateSpan) * chartW;
  };
  // Each muscle maps its own 0–1 norm onto the full chart height with a small margin
  const MARGIN = 0.08;
  const yOfNorm = (norm) =>
    PAD.t + chartH - (MARGIN + norm * (1 - 2 * MARGIN)) * chartH;

  const rangeOptions = [
    {label:"1M", days:30},{label:"3M", days:90},{label:"6M", days:180},{label:"1Y", days:365},
  ];

  // Draw a line per muscle using its independent norm scale
  const drawLines = (strokeWidth) => visibleMuscles.map(muscle => {
    const pts = series[muscle];
    if (pts.length < 2) {
      if (pts.length === 1) {
        const col = MUSCLE_COLORS[muscle] || "#888";
        return h('circle', {key: muscle, cx: xOf(pts[0].date), cy: yOfNorm(0.5), r: strokeWidth, fill: col});
      }
      return null;
    }
    const col = MUSCLE_COLORS[muscle] || "#888";

    // Build smooth cubic bezier path — control points at 1/3 of the distance between neighbours
    const coords = pts.map(p => [parseFloat(xOf(p.date).toFixed(1)), parseFloat(yOfNorm(p.norm).toFixed(1))]);
    let d = `M${coords[0][0]},${coords[0][1]}`;
    for (let i = 1; i < coords.length; i++) {
      const [x0, y0] = coords[i-1];
      const [x1, y1] = coords[i];
      const cpx = (x0 + x1) / 2;
      d += ` C${cpx},${y0} ${cpx},${y1} ${x1},${y1}`;
    }

    const last = pts[pts.length-1];
    return (
      h('g', {key: muscle}, h('path', {d: d, fill: "none", stroke: col, strokeWidth: strokeWidth, strokeLinecap: "round", strokeLinejoin: "round"}), h('circle', {cx: xOf(last.date), cy: yOfNorm(last.norm), r: strokeWidth+0.5, fill: col}), fullScreen && (
          h('text', {x: xOf(last.date)+5, y: yOfNorm(last.norm)+4, fontSize: "9", fill: col, fontWeight: "700"}, last.pct, '%')
        ))
    );
  });

  const chart = (
    h('svg', {width: "100%", viewBox: `0 0 ${W} ${H}`, style: {overflow:"visible"}}, [0.25, 0.5, 0.75].map(v => (
        h('line', {key: v, x1: PAD.l, y1: yOfNorm(v), x2: W-PAD.r, y2: yOfNorm(v), stroke: C.border, strokeWidth: "0.5", strokeDasharray: "2,4"})
      )), fullScreen && [0,0.25,0.5,0.75,1].map(frac => {
        const d2 = new Date(startDate.getTime() + frac*(endDate-startDate));
        const label = d2.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
        return h('text', {key: frac, x: PAD.l+frac*chartW, y: H-2, textAnchor: "middle", fontSize: "9", fill: C.dim}, label);
      }), drawLines(fullScreen ? 2.5 : 1.8))
  );


  if (!fullScreen) {
    return chart;
  }

  // Full screen modal
  return (
    h('div', {style: {position:"fixed",inset:0,zIndex:400,background:C.bg,overflowY:"auto",paddingBottom:48,
      animation:"slideInRight 0.26s cubic-bezier(0.32,0.72,0,1)"}}, h('div', {style: {position:"sticky",top:0,background:C.bg,zIndex:10,padding:"52px 20px 12px",
        borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}, h('div', null, h('h2', {style: {margin:"0 0 2px",fontSize:22,fontWeight:700,color:C.text}}, 'Strength Trends'), h('p', {style: {margin:0,fontSize:12,color:C.sub}}, 'Relative e1RM — baseline = first session in window')), h('button', {onClick: onClose, style: {background:C.card2,border:"none",borderRadius:"50%",width:34,height:34,
            color:C.sub,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}, '✕')), h('div', {style: {padding:"16px 20px"}}, h('div', {style: {display:"flex",gap:6,marginBottom:16}}, rangeOptions.map(({label,days}) => (
            h('button', {key: label, onClick: ()=>setRange(days), style: {flex:1,background:range===days?C.accent:C.card,border:`1px solid ${range===days?C.accent:C.border}`,
                borderRadius:10,padding:"8px 0",color:range===days?"#fff":C.text,
                fontSize:13,fontWeight:range===days?700:400,cursor:"pointer"}}, label)
          ))), h('div', {style: {display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}, MUSCLES.map(m => {
            const col = MUSCLE_COLORS[m] || "#888";
            const on = activeMuscles.has(m);
            return (
              h('button', {key: m, onClick: ()=>{
                setActiveMuscles(prev => {
                  const next = new Set(prev);
                  if (next.has(m) && next.size > 1) next.delete(m);
                  else next.add(m);
                  return next;
                });
              }, style: {display:"flex",alignItems:"center",gap:5,
                  background:on?col+"22":C.card2,border:`1px solid ${on?col:C.border}`,
                  borderRadius:20,padding:"6px 12px",cursor:"pointer"}}, h('div', {style: {width:8,height:8,borderRadius:"50%",background:on?col:C.dim}}), h('span', {style: {fontSize:12,fontWeight:on?600:400,color:on?col:C.sub}}, m))
            );
          })), h('div', {style: {background:C.card,borderRadius:16,padding:"16px 8px 8px"}}, chart), h('div', {style: {marginTop:14,display:"flex",flexDirection:"column",gap:8}}, visibleMuscles.map(m => {
            const pts = series[m];
            if (!pts.length) return null;
            const col = MUSCLE_COLORS[m]||"#888";
            const first = pts[0].pct;
            const last = pts[pts.length-1].pct;
            const diff = last - first;
            const rawLast = pts[pts.length-1].raw;
            return (
              h('div', {key: m, style: {display:"flex",alignItems:"center",gap:10,
                background:C.card,borderRadius:12,padding:"10px 14px"}}, h('div', {style: {width:12,height:12,borderRadius:"50%",background:col,flexShrink:0}}), h('span', {style: {fontSize:14,fontWeight:600,color:C.text,flex:1}}, m), h('span', {style: {fontSize:12,color:C.sub}}, formatWeight(rawLast), 'kg e1RM'), h('span', {style: {fontSize:13,fontWeight:700,
                  color:diff>1?"#34c759":diff<-1?"#ff3b30":C.sub,
                  minWidth:40,textAlign:"right"}}, diff>0?"+":"", diff, '%'))
            );
          }))))
  );
}

    setSaved(true); setTimeout(()=>setSaved(false), 1500);
  };
  const reset = () => {
    setSettings({...DEFAULT_ALGO});

    setSaved(true); setTimeout(()=>setSaved(false), 1500);

  const field = (label, key, desc, min, max, step=1) => {

      )

    h('div', {style:{padding:'20px'}},
      h('div', {style:{background:C.card,borderRadius:16,padding:'16px',marginBottom:16}},
        h('p', {style:{margin:'0 0 16px',fontSize:11,fontWeight:700,color:C.sub,textTransform:'uppercase',letterSpacing:0.8}}, 'Block Structure'),

function TrainingCalendar({ workoutLog }) {
  const today = new Date();
  const [viewOffset, setViewOffset] = React.useState(0);
  const year = today.getFullYear();
  const month = today.getMonth() + viewOffset;
  const displayDate = new Date(year, month, 1);
  const displayYear = displayDate.getFullYear();
  const displayMonth = displayDate.getMonth();
  const monthName = displayDate.toLocaleDateString('en-GB', {month:'long', year:'numeric'});
  const daysInMonth = new Date(displayYear, displayMonth+1, 0).getDate();
  const firstDayOfWeek = new Date(displayYear, displayMonth, 1).getDay();
  const startPad = (firstDayOfWeek + 6) % 7;
  const trainedDates = new Set(workoutLog.map(w=>w.date));
  const days = ['M','T','W','T','F','S','S'];
  const cells = [];
  for (let i=0; i<startPad; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);
  const todayStr = today.toISOString().slice(0,10);
  return h('div', {style:{background:C.card,borderRadius:16,padding:'14px 14px 10px',marginBottom:14}},
    h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
      h('button', {onClick:()=>setViewOffset(v=>v-1),style:{background:'none',border:'none',color:C.sub,fontSize:18,cursor:'pointer',padding:'0 4px'}}, '‹'),
      h('p', {style:{margin:0,fontSize:13,fontWeight:700,color:C.text}}, monthName),
      h('button', {onClick:()=>setViewOffset(v=>Math.min(0,v+1)),style:{background:'none',border:'none',color:viewOffset>=0?C.dim:C.sub,fontSize:18,cursor:viewOffset>=0?'default':'pointer',padding:'0 4px'}}, '›')
    ),
    h('div', {style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px 0',marginBottom:4}},
      days.map((d,i)=>h('div', {key:i,style:{textAlign:'center',fontSize:9,color:C.dim,fontWeight:600,padding:'0 0 4px'}}, d))
    ),
    h('div', {style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}},
      cells.map((d,i)=>{
        if(!d) return h('div', {key:'pad'+i});
        const dateStr = `${displayYear}-${String(displayMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const trained = trainedDates.has(dateStr);
        const isToday = dateStr===todayStr;
        const isFuture = dateStr>todayStr;
        return h('div', {key:d,style:{display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
          h('div', {style:{width:22,height:22,borderRadius:'50%',
            background:trained?C.accent:isToday?C.accent+'30':'transparent',
            border:isToday?`1px solid ${C.accent}`:'none',
            display:'flex',alignItems:'center',justifyContent:'center'}},
            h('span', {style:{fontSize:10,color:trained?'#fff':isFuture?C.dim:C.text,fontWeight:trained||isToday?700:400}}, d)
          )
        );
      })
    )
  );
}

// ─── Export to Strong ─────────────────────────────────────────────────────────
function exportToStrong(workoutLog, exerciseNotes) {
  const headers = ['Date','Workout Name','Duration','Exercise Name','Set Order','Weight','Reps','Distance','Seconds','Notes','Workout Notes','RPE'];
  const rows = [headers.map(h=>'"'+h+'"').join(',')];
  const csvEsc = s => '"'+(s||'').replace(/"/g,'""')+'"';
  const sorted = [...workoutLog].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(workout=>{
    const dateStr = workout.date+' 09:00:00';
    const workoutName = workout.name||'Workout';
    const secs = workout.durationSecs||0;
    const dur = !secs?'""':secs<3600?'"'+Math.floor(secs/60)+'m"':'"'+Math.floor(secs/3600)+'h '+Math.floor((secs%3600)/60)+'m"';
    const workoutNote = workout.notes||'';
    (workout.exercises||[]).forEach(ex=>{
      // Pinned note goes on first set; session notes go on all sets
      const exNote = exerciseNotes?.[ex.name];
      const pinnedNote = exNote?.pinned||'';
      (ex.sets||[]).forEach((set,i)=>{
        const rpeVal = set.rpe!=null&&set.rpe<=5
          ? Math.round(Math.min(10,Math.max(6,10-set.rpe)))
          : set.rpe!=null ? Math.round(set.rpe) : '';
        // Per-set note: pinned note on set 1, set-specific note otherwise
        const setNote = i===0 && pinnedNote ? pinnedNote : (set.note||'');
        rows.push([
          csvEsc(dateStr), csvEsc(workoutName), dur,
          csvEsc(ex.name), i+1,
          set.weight||0, set.reps||0,
          '""', '""',
          csvEsc(setNote), csvEsc(workoutNote), rpeVal
        ].join(','));
      });
    });
  });
  return rows.join('\n');
}

function formatWeight(n) {
  // Up to 2dp, strips trailing zeros: 128.0→'128', 127.50→'127.5', 127.25→'127.25'
  if (n === null || n === undefined || isNaN(n)) return '';
  return parseFloat(n.toFixed(2)).toString();
}

function formatElapsed(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}


// ─── iCloud Save / Load ───────────────────────────────────────────────────────
function buildFullBackup(history, workoutLog, planDays, totalSessionCount, weightUnit, restTimerDefault, exerciseNotes, exerciseRestTimers) {
  return JSON.stringify({
    version: 2,
    exportedAt: new Date().toISOString(),
    history,
    workoutLog,
    planDays,
    totalSessionCount,
    weightUnit,
    restTimerDefault,
    exerciseNotes: exerciseNotes || {},
    exerciseRestTimers: exerciseRestTimers || {},
    algoSettings: (() => { try { return JSON.parse(localStorage.getItem('gymai_algo')||'{}'); } catch(e){ return {}; } })()
  }, null, 2);
}

function saveToiCloud(jsonStr) {
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gymAI-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  // Record the save time
  try { localStorage.setItem('gymai_lastCloudSave', new Date().toISOString()); } catch(e) {}
}

function loadFromiCloud(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      onSuccess(data);
    } catch(err) {
      onError('Could not read file — make sure it is a gymAI backup JSON.');
    }
  };
  reader.onerror = () => onError('Failed to read file.');
  reader.readAsText(file);
}

const MUSCLE_VOLUME_TARGETS = {
  Chest:      { mev: 8,  sweet: 14, mrv: 22 },
  Back:       { mev: 10, sweet: 16, mrv: 24 },
  Shoulders:  { mev: 8,  sweet: 14, mrv: 20 },
  Quads:      { mev: 8,  sweet: 14, mrv: 20 },
  Hamstrings: { mev: 6,  sweet: 11, mrv: 16 },
  Glutes:     { mev: 4,  sweet: 9,  mrv: 14 },
  Biceps:     { mev: 6,  sweet: 12, mrv: 18 },
  Triceps:    { mev: 6,  sweet: 12, mrv: 18 },
  Traps:      { mev: 4,  sweet: 10, mrv: 16 },
  Calves:     { mev: 8,  sweet: 14, mrv: 20 },
  Core:       { mev: 4,  sweet: 10, mrv: 16 },
};

const CAT_TO_MUSCLE = {
  "Incline Chest":"Chest","Horizontal Chest":"Chest",
  "Horizontal Pull":"Back","Vertical Pull":"Back","Traps":"Traps",
  "Vertical Shoulders":"Shoulders","Lateral Shoulders":"Shoulders","Rear Shoulders":"Shoulders",
  "Quads":"Quads","Hamstrings":"Hamstrings","Glutes":"Glutes",
  "Calves":"Calves","Biceps":"Biceps","Triceps":"Triceps","Core":"Core",
};

function countVolume(workoutLog, days) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  const setCounts = {};
  Object.keys(MUSCLE_VOLUME_TARGETS).forEach(m => setCounts[m] = 0);
  workoutLog.forEach(workout => {
    if (workout.date < cutoffStr) return;
    (workout.exercises||[]).forEach(ex => {
      const libEntry = (typeof EXERCISE_LIBRARY!=='undefined'?EXERCISE_LIBRARY:[]).find(e=>e.name===ex.name);
      let muscle = null;
      if (libEntry) {
        const m = libEntry.muscle;
        if (m==='Chest') muscle='Chest';
        else if (m==='Back') muscle='Back';
        else if (m==='Shoulders') muscle='Shoulders';
        else if (m==='Quads'||m==='Legs') muscle='Quads';
        else if (m==='Hamstrings') muscle='Hamstrings';
        else if (m==='Glutes') muscle='Glutes';
        else if (m==='Calves') muscle='Calves';
        else if (m==='Biceps'||m==='Arms') muscle='Biceps';
        else if (m==='Triceps') muscle='Triceps';
        else if (m==='Traps') muscle='Traps';
        else if (m==='Core'||m==='Abs') muscle='Core';
      }
      if (!muscle) {
        Object.entries(MOVEMENT_CATEGORIES||{}).forEach(([cat,data])=>{
          if ((data.anchorPool||[]).includes(ex.name)||(data.secondaryPool||[]).includes(ex.name)) {
            const mapped=CAT_TO_MUSCLE[cat]; if(mapped) muscle=mapped;
          }
        });
      }
      if (muscle && setCounts[muscle]!==undefined) {
        setCounts[muscle]+=(ex.sets||[]).filter(s=>!s.dropSet).length;
      }
    });
  });
  return setCounts;
}

function VolumeWidget({ workoutLog }) {
  const [expanded, setExpanded] = useState(false);
  const [days, setDays] = useState(7);
  const scrubOptions = [3,5,7,10,14,21,28];

  const rawCounts = countVolume(workoutLog, days);
  const weeks = days / 7;
  // Normalise to average weekly sets for comparison against weekly targets
  const setCounts = Object.fromEntries(
    Object.entries(rawCounts).map(([m, v]) => [m, Math.round((v / weeks) * 10) / 10])
  );
  const muscles = Object.keys(MUSCLE_VOLUME_TARGETS);

  // Collapsed: just show a summary row of coloured dots
  const summaryDots = muscles.map(muscle => {
    const { mev, mrv } = MUSCLE_VOLUME_TARGETS[muscle];
    const sets = setCounts[muscle] || 0;
    const col = sets===0?C.dim:sets<mev?C.orange:sets<=mrv?C.green:C.red;
    return h('div', {key:muscle,
      title:muscle,
      style:{flex:1,height:6,borderRadius:3,background:col,opacity:sets===0?0.25:0.8}});
  });

  const bars = muscles.map(muscle => {
    const { mev, sweet, mrv } = MUSCLE_VOLUME_TARGETS[muscle];
    const sets = setCounts[muscle] || 0;
    const pct = Math.min(1, sets / mrv);
    const sweetPct = sweet / mrv;
    const mevPct = mev / mrv;
    const col = sets===0?C.dim:sets<mev?C.orange:sets<=mrv?C.green:C.red;
    const label = sets===0?'–':sets<mev?'Low':sets<=sweet?'Good':sets<=mrv?'High':'Max';

    return h('div', {key:muscle, style:{marginBottom:10}},
      h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:3}},
        h('span', {style:{fontSize:12,fontWeight:600,color:C.text}}, muscle),
        h('div', {style:{display:'flex',alignItems:'center',gap:6}},
          h('span', {style:{fontSize:11,color:col,fontWeight:700}}, label),
          h('span', {style:{fontSize:11,color:C.sub}}, `${sets} sets`)

      ),
      h('div', {style:{position:'relative',height:10,borderRadius:5,background:C.card2,overflow:'hidden'}},
        h('div', {style:{position:'absolute',left:`${mevPct*100}%`,width:`${(1-mevPct)*100}%`,top:0,bottom:0,background:C.green+'25'}}),
        h('div', {style:{position:'absolute',left:`${sweetPct*100}%`,width:2,top:0,bottom:0,background:C.green+'70'}}),
        sets>0&&h('div', {style:{
          position:'absolute',left:`${Math.min(0.96,pct)*100}%`,
          top:'50%',transform:'translate(-50%,-50%)',
          width:10,height:10,borderRadius:'50%',
          background:col,boxShadow:`0 0 0 2px ${C.card}`,zIndex:1,
          transition:'left 0.35s cubic-bezier(0.34,1.56,0.64,1)',
        }})
      )
    );
  });

  return h('div', {style:{background:C.card,borderRadius:16,marginBottom:14,overflow:'hidden',border:`1px solid ${C.border}`}},
    // Header — always visible, tap to expand
    h('button', {onClick:()=>setExpanded(e=>!e),
      style:{width:'100%',background:'none',border:'none',cursor:'pointer',padding:'12px 14px',
        display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}},
      h('div', {style:{flex:1,minWidth:0}},
        h('p', {style:{margin:'0 0 6px',fontSize:13,fontWeight:700,color:C.text,textAlign:'left'}},
          'Weekly Volume'),
        h('div', {style:{display:'flex',gap:3}}, summaryDots)
      ),
      h('span', {style:{color:C.sub,fontSize:14,flexShrink:0,transition:'transform 0.2s',
        transform:expanded?'rotate(180deg)':'rotate(0deg)'}}, '▾')
    ),

    // Expanded content
    expanded&&h('div', {style:{padding:'0 14px 14px'}},
      // Scrubber
      h('div', {style:{marginBottom:14}},
        h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},

function SwapPicker({ swappingSlot, setSwappingSlot, history, totalSessionCount,
                      setActiveDay, setPlanDays, setLiveSlots }) {
  const [swapSearch, setSwapSearch] = useState('');
  const slotCat = swappingSlot.slot?.category;
  const anchorEx = swappingSlot.anchorEx || null;

  const allOptions = suggestSecondaryExercise(slotCat, history,
    swappingSlot.slot?.currentExercise, anchorEx);

  const searchLower = swapSearch.toLowerCase().trim();
  const displayed = searchLower
    ? EXERCISE_LIBRARY
        .filter(e => e.name.toLowerCase().includes(searchLower))
        .map(e => ({ ex: e.name, score: 0, hasHistory: !!(history[e.name]?.length),
          overlaps: false, fromSearch: true }))
    : allOptions;

  const doSwap = (ex) => {
    setActiveDay(prev => prev ? {...prev, slots: prev.slots.map(s =>
      s.id===swappingSlot.slot.id ? {...s, currentExercise: ex} : s)} : prev);
    setPlanDays(prev => prev.map(d => ({...d, slots: d.slots.map(s =>
      s.id===swappingSlot.slot.id ? {...s, currentExercise: ex} : s)})));
    setLiveSlots(prev => {
      const sug2 = generateSlotSuggestion(
        {...swappingSlot.slot, currentExercise: ex}, history, totalSessionCount);
      const preReps = sug2.lastReps > 0
        ? Math.max(sug2.repMin, Math.min(sug2.repMax, sug2.lastReps))
        : Math.round((sug2.repMin + sug2.repMax) / 2);
      return {...prev, [swappingSlot.slot.id]: Array.from({length: sug2.sets}, () => ({
        weight: sug2.weight, reps: preReps, rpe: sug2.targetRIRhi,
        done: false, dropSet: false}))};
    });
    setSwappingSlot(null);
  };

  return h('div', {style:{position:"fixed",inset:0,zIndex:350,
    display:"flex",flexDirection:"column",background:"rgba(0,0,0,0.5)",
    backdropFilter:"blur(4px)"}, onClick:()=>setSwappingSlot(null)},
    h('div', {style:{marginTop:"auto",width:"100%",maxWidth:430,margin:"auto auto 0",
      background:C.bg,borderRadius:"20px 20px 0 0",
      maxHeight:"80vh",display:"flex",flexDirection:"column"},
      onClick:e=>e.stopPropagation()},
      h('div', {style:{padding:"12px 16px 8px",flexShrink:0}},
        h('div', {style:{display:"flex",justifyContent:"center",marginBottom:10}},
          h('div', {style:{width:36,height:4,borderRadius:2,background:C.border}})),
        h('div', {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
          h('div', null,
            h('p', {style:{margin:"0 0 1px",fontSize:16,fontWeight:700,color:C.text}}, 'Swap Exercise'),
            h('p', {style:{margin:0,fontSize:12,color:C.sub}}, slotCat)
          ),
          h('button', {onClick:()=>setSwappingSlot(null),
            style:{background:C.card2,border:"none",borderRadius:"50%",
              width:30,height:30,color:C.sub,cursor:"pointer",fontSize:16}}, '✕')
        ),
        h('input', {value:swapSearch, onChange:e=>setSwapSearch(e.target.value),
          placeholder:"Search all exercises...",
          style:{width:"100%",boxSizing:"border-box",background:C.card,border:"none",
            borderRadius:10,padding:"10px 12px",color:C.text,fontSize:14,outline:"none"}})
      ),
      h('p', {style:{margin:"6px 16px 4px",fontSize:11,color:C.dim,fontWeight:600,
        textTransform:"uppercase",letterSpacing:0.6,flexShrink:0}},
        searchLower ? `${displayed.length} results` : 'Ranked by freshness · fatigue overlap flagged'),
      h('div', {style:{overflowY:"auto",flex:1,padding:"0 12px 48px"}},
        displayed.length === 0 &&
          h('p', {style:{color:C.sub,fontSize:14,textAlign:"center",padding:"24px 0"}},
            'No exercises found'),
        displayed.map(({ex, hasHistory, overlaps, fromSearch}) => {
          const isCurrent = ex === swappingSlot.slot?.currentExercise;
          const lib = EXERCISE_LIBRARY.find(e => e.name === ex);
          return h('button', {key:ex, onClick:()=>doSwap(ex),
            style:{width:"100%",textAlign:"left",
              background: isCurrent ? C.accent+"22" : C.card,
              border:`1px solid ${isCurrent?C.accent:overlaps&&!fromSearch?C.orange+"60":C.border}`,
              borderRadius:12,padding:"11px 12px",marginBottom:6,cursor:"pointer",
              display:"flex",alignItems:"center",gap:10}},
            h('span', {style:{fontSize:20,flexShrink:0}}, lib?.icon||'·'),
            h('div', {style:{flex:1,minWidth:0}},
              h('p', {style:{margin:"0 0 1px",fontSize:14,fontWeight:600,
                color:isCurrent?C.accent:C.text,
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}, ex),
              h('p', {style:{margin:0,fontSize:11,color:C.sub}},
                [lib?.type, lib?.equipment,
                 hasHistory ? '✓ In history' : 'New',
                 overlaps && !fromSearch ? '⚠ Fatigue overlap' : null
                ].filter(Boolean).join(' · '))
            ),
            isCurrent && h('span', {style:{fontSize:11,color:C.accent,fontWeight:700,flexShrink:0}},
              'Current')
          );
        })
      )
    )
  );
}


function App() {
  const [tab, setTab] = useState(() => {
    try {
      const aw = localStorage.getItem('gymai_activeWorkout');
      if (aw) return 'workout';
      const saved = localStorage.getItem('gymai_tab');
      return saved && ['today','library','history','coach'].includes(saved) ? saved : 'today';
    } catch(e) { return 'today'; }
  });
  const [history, setHistory] = useState(() => {
    try {
      const s = localStorage.getItem("gymai_history");

          onClearData: ()=>{ setShowSettings(false); setConfirmClear(true); },
          onSaveCloud: ()=>{ setShowSettings(false); saveCloudData(); },
          onLoadCloud: ()=>{ setShowSettings(false); setShowCloudLoad(true); },
          onExportStrong: ()=>{
            const csv = exportToStrong(workoutLog, exerciseNotes);
            const blob = new Blob([csv], {type:'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'gymAI-strong-'+new Date().toISOString().slice(0,10)+'.csv';
            a.click(); URL.revokeObjectURL(url);
          }, onShowAlgo: ()=>{ setShowSettings(false); setShowAlgoSettings(true); }, onClose: ()=>setShowSettings(false)})
    )
    )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App, null));
  </script>
</body>
</html>
